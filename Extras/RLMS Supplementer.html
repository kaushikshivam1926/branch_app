        // --- PDF Coordinate-Based Extraction Logic ---
        const extractDataByCoordinates = (pagesItems) => {
            const extracted = {};
            
            for (const [key, box] of Object.entries(PDF_COORDINATES)) {
                const pageItems = pagesItems[box.page] || [];
                
                const tolerance = 5;
                const left = box.x - tolerance;
                const right = box.x + box.width + tolerance;
                const top = box.y + tolerance; 
                const bottom = box.y - box.height - tolerance; 

                const matchedItems = pageItems.filter(item => {
                    return item.x >= left && item.x <= right && item.y >= bottom && item.y <= top;
                });

                if (matchedItems.length > 0) {
                    matchedItems.sort((a, b) => {
                        if (Math.abs(a.y - b.y) > 4) {
                            return b.y - a.y; 
                        }
                        return a.x - b.x; 
                    });

                    let fieldText = matchedItems.map(item => item.str).join(' ').trim();
                    fieldText = fieldText.replace(/\s+/g, ' '); 
                    
                    if (fieldText) {
                        extracted[key] = fieldText;
                    }
                }
            }
            
            const dateFields = ['dob', 'addressProofDate', 'passportValidUpto', 'dlValidUpto', 'expPresentJobDOJ', 'retirementDate', 'acOpenDate', 'disbursementDate'];
            dateFields.forEach(field => {
                if (extracted[field]) {
                    const dateMatch = extracted[field].match(/(\d{2})[-/](\d{2})[-/](\d{4})/);
                    if (dateMatch) {
                        extracted[field] = `${dateMatch[3]}-${dateMatch[2]}-${dateMatch[1]}`;
                    } else {
                        const shortDateMatch = extracted[field].match(/(\d{2})[-/](\d{2})[-/](\d{2})\b/);
                        if (shortDateMatch && !extracted[field].includes('20')) {
                            let year = parseInt(shortDateMatch[3], 10);
                            year = year < 50 ? 2000 + year : 1900 + year; 
                            extracted[field] = `${year}-${shortDateMatch[2]}-${shortDateMatch[1]}`;
                        }
                    }
                }
            });

            return extracted;
        };

        // --- Helper Date Formatter for HTML Printing ---
        const formatDate = (dateString) => {
            if (!dateString) return '.......................';
            const [year, month, day] = dateString.split('-');
            if (year && month && day) return `${day}/${month}/${year}`;
            return dateString;
        };

        // --- Helper Name Formatter for Proper Case ---
        const toProperCase = (str) => {
            if (!str) return '';
            return str.split(' ').map(word => {
                if (!word) return '';
                // Only convert if the word is fully uppercase (auto-corrects caps lock & PDF dumps).
                // Leaves mixed-case words like "MacDonald" alone.
                if (word === word.toUpperCase() && /[A-Z]/.test(word)) {
                    return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
                }
                return word;
            }).join(' ');
        };

        // --- Helper Number to Words Formatter ---
        const numberToWords = (num) => {
            if (!num) return '';
            const cleanNum = String(num).replace(/,/g, '').split('.')[0];
            if (isNaN(cleanNum) || cleanNum === '') return '';
            const a = ['','one ','two ','three ','four ', 'five ','six ','seven ','eight ','nine ','ten ','eleven ','twelve ','thirteen ','fourteen ','fifteen ','sixteen ','seventeen ','eighteen ','nineteen '];
            const b = ['', '', 'twenty','thirty','forty','fifty', 'sixty','seventy','eighty','ninety'];
            if (cleanNum.length > 9) return cleanNum; // Number too large
            let str = '';
            const numArr = ('000000000' + cleanNum).substr(-9).match(/^(\d{2})(\d{2})(\d{2})(\d{1})(\d{2})$/);
            if (!numArr) return cleanNum;
            if (numArr[1] != 0) { str += (a[Number(numArr[1])] || b[numArr[1][0]] + ' ' + a[numArr[1][1]]) + 'crore '; }
            if (numArr[2] != 0) { str += (a[Number(numArr[2])] || b[numArr[2][0]] + ' ' + a[numArr[2][1]]) + 'lakh '; }
            if (numArr[3] != 0) { str += (a[Number(numArr[3])] || b[numArr[3][0]] + ' ' + a[numArr[3][1]]) + 'thousand '; }
            if (numArr[4] != 0) { str += (a[Number(numArr[4])] || b[numArr[4][0]] + ' ' + a[numArr[4][1]]) + 'hundred '; }
            if (numArr[5] != 0) {
                if (str != '') str += 'and ';
                str += (a[Number(numArr[5])] || b[numArr[5][0]] + ' ' + a[numArr[5][1]]).trim() + ' ';
            }
            str = str.trim();
            return str.charAt(0).toUpperCase() + str.slice(1);
        };

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-2">
                                        <InputField label="Personal/Force No." name="forceNo" value={data.forceNo} onChange={handleChange} readOnly={readOnlyFields.forceNo} />
                                        <InputField label="Regiment Name" name="regimentName" value={data.regimentName} onChange={handleChange} readOnly={readOnlyFields.regimentName} />
                                    </div>
                                </div>
                            </div>
                        );
                    case 'Bank Details':
                        return (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-6 gap-y-2">
                                <InputField label="Salary Account No." name="salaryAcNo" value={data.salaryAcNo} onChange={handleChange} readOnly={readOnlyFields.salaryAcNo} />
                                <InputField label="Name of Bank" name="bankName" value={data.bankName} onChange={handleChange} readOnly={readOnlyFields.bankName} />
                                <InputField label="Date of Account Opening" name="acOpenDate" type="date" value={data.acOpenDate} onChange={handleChange} readOnly={readOnlyFields.acOpenDate} />
                                <InputField label="Existing Xpress Cr. A/c No." name="xpressCrAcNo" value={data.xpressCrAcNo} onChange={handleChange} readOnly={readOnlyFields.xpressCrAcNo} />
                                <InputField label="Sanctioned Limit" name="sanctionedLimit" value={data.sanctionedLimit} onChange={handleChange} readOnly={readOnlyFields.sanctionedLimit} />
                                <InputField label="No. of EMIs Paid" name="emisPaid" type="number" value={data.emisPaid} onChange={handleChange} readOnly={readOnlyFields.emisPaid} />
                                <InputField label="CIF No." name="cifNo" value={data.cifNo} onChange={handleChange} readOnly={readOnlyFields.cifNo} />
                                <InputField label="Name of Branch" name="branchName" value={data.branchName} onChange={handleChange} readOnly={readOnlyFields.branchName} />
                                <InputField label="Name of Salary Package" name="salaryPackageName" value={data.salaryPackageName} onChange={handleChange} readOnly={readOnlyFields.salaryPackageName} />
                                <InputField label="Date of Disbursement" name="disbursementDate" type="date" value={data.disbursementDate} onChange={handleChange} readOnly={readOnlyFields.disbursementDate} />
                                <InputField label="Outstanding Amount" name="outstandingAmount" value={data.outstandingAmount} onChange={handleChange} readOnly={readOnlyFields.outstandingAmount} />
                                <InputField label="Risk Grade" name="riskGrade" value={data.riskGrade} onChange={handleChange} readOnly={readOnlyFields.riskGrade} />
                            </div>
                        );
                    case 'References & Assets':
                        return (
                            <div className="space-y-6">
                                <div>
                                    <h3 className="text-lg font-bold border-b pb-2 mb-4 text-slate-800">References (Not related to you)</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="bg-slate-50 p-4 border border-slate-200 rounded-md">
                                            <h4 className="font-semibold mb-3 text-slate-600">Reference 1</h4>
                                            <InputField label="Name" name="ref1Name" value={data.ref1Name} onChange={handleChange} readOnly={readOnlyFields.ref1Name} />
                                            <InputField label="Address" name="ref1Address" value={data.ref1Address} onChange={handleChange} readOnly={readOnlyFields.ref1Address} />
                                            <InputField label="Email" name="ref1Email" value={data.ref1Email} onChange={handleChange} readOnly={readOnlyFields.ref1Email} />
                                            <InputField label="Telephone" name="ref1Telephone" value={data.ref1Telephone} onChange={handleChange} readOnly={readOnlyFields.ref1Telephone} />
                                            <InputField label="Mobile" name="ref1Mobile" value={data.ref1Mobile} onChange={handleChange} readOnly={readOnlyFields.ref1Mobile} />
                                        </div>
                                        <div className="bg-slate-50 p-4 border border-slate-200 rounded-md">
                                            <h4 className="font-semibold mb-3 text-slate-600">Reference 2</h4>
                                            <InputField label="Name" name="ref2Name" value={data.ref2Name} onChange={handleChange} readOnly={readOnlyFields.ref2Name} />
                                            <InputField label="Address" name="ref2Address" value={data.ref2Address} onChange={handleChange} readOnly={readOnlyFields.ref2Address} />
                                            <InputField label="Email" name="ref2Email" value={data.ref2Email} onChange={handleChange} readOnly={readOnlyFields.ref2Email} />
                                            <InputField label="Telephone" name="ref2Telephone" value={data.ref2Telephone} onChange={handleChange} readOnly={readOnlyFields.ref2Telephone} />
                                            <InputField label="Mobile" name="ref2Mobile" value={data.ref2Mobile} onChange={handleChange} readOnly={readOnlyFields.ref2Mobile} />
                                        </div>
                                    </div>
                                </div>
                                
                                <div>
                                    <h3 className="text-lg font-bold border-b pb-2 mb-4 text-slate-800">Assets & Liabilities</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-2">
                                        <TextAreaField label="Bank Account Details" name="bankAccountDetails" value={data.bankAccountDetails} onChange={handleChange} readOnly={readOnlyFields.bankAccountDetails} />
                                        <TextAreaField label="Credit Cards" name="creditCards" value={data.creditCards} onChange={handleChange} readOnly={readOnlyFields.creditCards} />
                                        <TextAreaField label="Fixed Deposits" name="fixedDeposits" value={data.fixedDeposits} onChange={handleChange} readOnly={readOnlyFields.fixedDeposits} />
                                        <TextAreaField label="Bonds, Shares, Mutual Fund, Other Investments" name="otherInvestments" value={data.otherInvestments} onChange={handleChange} readOnly={readOnlyFields.otherInvestments} />
                                        <TextAreaField label="Precious metals/Gold/Jewellery/Vehicle/Property etc." name="assetsProperties" value={data.assetsProperties} onChange={handleChange} readOnly={readOnlyFields.assetsProperties} />
                                    </div>
                                </div>
                            </div>
                        );
                    case 'Loan Info':
                        return (
                            <div className="space-y-6">
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-6 gap-y-2">
                                    <InputField label="Gross Income" name="grossIncome" value={data.grossIncome} onChange={handleChange} readOnly={readOnlyFields.grossIncome} />
                                    <InputField label="Net Income" name="netIncome" value={data.netIncome} onChange={handleChange} readOnly={readOnlyFields.netIncome} />
                                    <InputField label="Net Monthly Income" name="netMonthlyIncome" value={data.netMonthlyIncome} onChange={handleChange} readOnly={readOnlyFields.netMonthlyIncome} />
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-6 gap-y-2">
                                    <InputField label="Product variant & Scheme Name" name="loanVariant" value={data.loanVariant} onChange={handleChange} readOnly={readOnlyFields.loanVariant} />
                                    <InputField label="Campaign ID" name="campaignId" value={data.campaignId} onChange={handleChange} readOnly={readOnlyFields.campaignId} />
                                    <InputField label="Loan Amount" name="loanAmount" value={data.loanAmount} onChange={handleChange} readOnly={readOnlyFields.loanAmount} />
                                    <InputField label="Tenure (Months)" name="repaymentTenure" type="number" value={data.repaymentTenure} onChange={handleChange} readOnly={readOnlyFields.repaymentTenure} />
                                    <InputField label="Proposed EMI" name="proposedEmi" value={data.proposedEmi} onChange={handleChange} readOnly={readOnlyFields.proposedEmi} />
                                    <InputField label="EMI/NMI Ratio" name="emiNmiRatio" value={data.emiNmiRatio} onChange={handleChange} readOnly={readOnlyFields.emiNmiRatio} />
                                    <InputField label="Rate of interest (%)" name="interestRate" value={data.interestRate} onChange={handleChange} readOnly={readOnlyFields.interestRate} />
                                    <InputField label="Processing Fee Rs" name="processingFee" value={data.processingFee} onChange={handleChange} readOnly={readOnlyFields.processingFee} />
                                    <InputField label="Sourcing Channel" name="sourcingChannel" value={data.sourcingChannel} onChange={handleChange} readOnly={readOnlyFields.sourcingChannel} />
                                    <InputField label="Salary Packages" name="salaryPackages" value={data.salaryPackages} onChange={handleChange} readOnly={readOnlyFields.salaryPackages} />
                                    <InputField label="Corporate & Institutional Tie-ups" name="corporateTieUps" value={data.corporateTieUps} onChange={handleChange} readOnly={readOnlyFields.corporateTieUps} />
                                    <InputField label="Check-off" name="checkOff" value={data.checkOff} onChange={handleChange} readOnly={readOnlyFields.checkOff} />
                                    <InputField label="Concessions if any %" name="concessionPercent" value={data.concessionPercent} onChange={handleChange} readOnly={readOnlyFields.concessionPercent} />
                                    <InputField label="Concession In Processing fee" name="concessionInProcessingFee" value={data.concessionInProcessingFee} onChange={handleChange} readOnly={readOnlyFields.concessionInProcessingFee} />
                                    <div className="col-span-full">
                                        <InputField label="Loan Purpose" name="loanPurpose" value={data.loanPurpose} onChange={handleChange} readOnly={readOnlyFields.loanPurpose} />
                                    </div>
                                </div>
                                
                                <div className="bg-blue-50 p-4 rounded-md border border-blue-100">
                                    <h4 className="font-semibold text-blue-900 mb-4 border-b border-blue-200 pb-2">Insurance Options</h4>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-2">
                                        <SelectField label="Do you wish to be covered by SBI Life cover?" name="optLifeInsurance" value={data.optLifeInsurance} onChange={handleChange} options={['Yes', 'No']} readOnly={readOnlyFields.optLifeInsurance} />
                                        <SelectField label="If Yes, want to add the premium in Personal Loan?" name="addLifePremium" value={data.addLifePremium} onChange={handleChange} options={['Yes', 'No']} readOnly={readOnlyFields.addLifePremium} />
                                        <SelectField label="Do you wish to be covered by SBI General Loan Insurance?" name="optGeneralInsurance" value={data.optGeneralInsurance} onChange={handleChange} options={['Yes', 'No']} readOnly={readOnlyFields.optGeneralInsurance} />
                                        <SelectField label="If Yes, want to add the premium in Personal Loan?" name="addGeneralPremium" value={data.addGeneralPremium} onChange={handleChange} options={['Yes', 'No']} readOnly={readOnlyFields.addGeneralPremium} />
                                    </div>
                                </div>
                            </div>
                        );
                    case 'Finalise & Print':
                        return (
                            <div className="space-y-6">
                                {!isFinalised ? (
                                    <div className="flex flex-col items-center justify-center p-12 bg-white rounded-xl border border-slate-200 shadow-sm mt-4">
                                        <h3 className="text-2xl font-bold mb-4 text-slate-800">Finalise Application</h3>
                                        <p className="text-slate-600 mb-8 text-center max-w-lg">Please ensure all required fields are filled out in the previous tabs. Once finalised, you will be able to print the main application and all supporting annexures.</p>
                                        <button onClick={() => setIsFinalised(true)} className="bg-green-600 hover:bg-green-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg transition">Finalise Data</button>
                                    </div>
                                ) : (
                                    <div className="space-y-6">
                                        <div className="bg-green-50 p-4 border border-green-200 rounded-md text-green-800 font-semibold flex items-center">
                                            <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>
                                            Application Finalised. You can now generate the forms below.
                                        </div>
                                        
                                        <h3 className="text-lg font-bold border-b pb-2 mb-4 text-slate-800 mt-6">Main Application</h3>
                                        <div className="p-4 border rounded-lg shadow-sm bg-white flex justify-between items-center">
                                            <div>
                                                <span className="font-semibold text-slate-800 block">1. Main PL Application Form (PL-1)</span>
                                                <span className="text-xs text-slate-500">Requires original PDF to be uploaded</span>
                                            </div>
                                            <button onClick={handleGeneratePDF} disabled={isProcessing || !pdfBytes} className={`bg-blue-600 hover:bg-blue-500 text-white font-semibold px-4 py-2 rounded transition shadow-md ${(!pdfBytes || isProcessing) ? 'opacity-50 cursor-not-allowed' : ''}`}>
                                                Print / Save PDF
                                            </button>
                                        </div>

                                        <h3 className="text-lg font-bold border-b pb-2 mb-4 text-slate-800 mt-8">Supplementary Formats & Annexures</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div className="p-4 border rounded-lg shadow-sm bg-white flex justify-between items-center">
                                                <span className="font-semibold text-slate-800">2. Irrevocable Authority (PL-12)</span>
                                                <button onClick={() => triggerHTMLPrint('pl12')} className="bg-slate-700 hover:bg-slate-600 text-white font-semibold px-4 py-2 rounded transition shadow-md">Print Form</button>
                                            </div>
                                            <div className="p-4 border rounded-lg shadow-sm bg-white flex justify-between items-center">
                                                <span className="font-semibold text-slate-800">3. IT Undertaking Sec 281</span>
                                                <button onClick={() => triggerHTMLPrint('sec281')} className="bg-slate-700 hover:bg-slate-600 text-white font-semibold px-4 py-2 rounded transition shadow-md">Print Form</button>
                                            </div>
                                            <div className="p-4 border rounded-lg shadow-sm bg-white flex justify-between items-center">
                                                <span className="font-semibold text-slate-800">4. Consent to Disclose to NeSL</span>
                                                <button onClick={() => triggerHTMLPrint('nesl')} className="bg-slate-700 hover:bg-slate-600 text-white font-semibold px-4 py-2 rounded transition shadow-md">Print Form</button>
                                            </div>
                                            <div className="p-4 border rounded-lg shadow-sm bg-white flex justify-between items-center">
                                                <span className="font-semibold text-slate-800">5. Annexure II</span>
                                                <button onClick={() => triggerHTMLPrint('annex2')} className="bg-slate-700 hover:bg-slate-600 text-white font-semibold px-4 py-2 rounded transition shadow-md">Print Form</button>
                                            </div>
                                            <div className="p-4 border rounded-lg shadow-sm bg-white flex justify-between items-center">
                                                <span className="font-semibold text-slate-800">6. Annexure 10</span>
                                                <button onClick={() => triggerHTMLPrint('annex10')} className="bg-slate-700 hover:bg-slate-600 text-white font-semibold px-4 py-2 rounded transition shadow-md">Print Form</button>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        );
                    default: return null;
                }
            };

            return (
                <>
                {printDocId ? (
                    <div className="bg-white w-full max-w-[210mm] min-h-[297mm] mx-auto p-10 print:p-[15mm] text-black print:m-0 relative overflow-hidden shadow-xl print:shadow-none">
                        
                        {/* Only render Watermark and Blue Curve for PL12 and Annexure 10 */}
                        <TopRightCurve />
                        {(printDocId === 'pl12' || printDocId === 'annex10') && (
                            <>
                                <Watermark />
                            </>
                        )}
                        
                        <div className="relative z-10">
                            {renderPrintDocument()}
                        </div>
                    </div>
                ) : (
                    <div className="flex flex-col h-screen overflow-hidden bg-slate-50 relative print:hidden">
                        {/* Header */}
                        <header className="bg-blue-900 text-white shadow-md p-4 flex justify-between items-center z-10">
                            <div className="flex items-center space-x-3">
                                <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                                <h1 className="text-xl font-bold hidden md:block">RLMS Supplementer</h1>
                            </div>
                            <div className="flex space-x-3 text-sm">
                                <button onClick={handleClearData} className="text-slate-300 hover:text-white px-2 py-2 rounded transition font-semibold mr-2">
                                    Clear Data
                                </button>
                            </div>
                        </header>

                        {isProcessing && (
                            <div className="absolute inset-0 bg-white/70 z-50 flex items-center justify-center">
                                <div className="bg-blue-900 text-white px-6 py-3 rounded-full font-bold shadow-xl animate-pulse">Processing Document...</div>
                            </div>
                        )}

                        {/* Main UI */}
                        <div className="flex flex-1 overflow-hidden">
                            {/* Sidebar Navigation */}
                            <aside className="w-64 bg-white border-r border-slate-200 shadow-sm z-0 flex flex-col">
                                {!pdfBytes && (
                                    <div className="p-4 bg-amber-50 text-xs text-amber-700 border-b border-amber-200">
                                        <strong>Step 1:</strong> Go to the "Application Details" tab to upload the Bank's PDF form and auto-fill your details.
                                    </div>
                                )}
                                <nav className="flex-1 overflow-y-auto py-4">
                                    <ul>
                                        {tabs.map(tab => (
                                            <li key={tab}>
                                                <button 
                                                    onClick={() => setActiveTab(tab)}
                                                    className={`w-full text-left px-6 py-3 font-medium transition-colors duration-150 ${
                                                        activeTab === tab 
                                                        ? 'bg-blue-50 text-blue-700 border-r-4 border-blue-600' 
                                                        : 'text-slate-600 hover:bg-slate-50'
                                                    }`}
                                                >
                                                    {tab}
                                                </button>
                                            </li>
                                        ))}
                                    </ul>
                                </nav>
                            </aside>

                            {/* Content Area */}
                            <main className="flex-1 overflow-y-auto p-8 bg-slate-50">
                                <div className="max-w-5xl mx-auto bg-white rounded-xl shadow-sm border border-slate-200 p-8">
                                    <h2 className="text-2xl font-bold text-slate-800 mb-6 pb-2 border-b border-slate-200">{activeTab}</h2>
                                    <form onSubmit={(e) => e.preventDefault()}>
                                        {renderFormFields()}
                                    </form>
                                </div>
                            </main>
                        </div>
                    </div>
                )}
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
